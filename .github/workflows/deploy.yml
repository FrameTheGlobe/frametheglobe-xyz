name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.25.83.156
          username: u461388193
          password: ${{ secrets.SSH_PASS }}
          port: 65002
          command_timeout: 10m
          script: |
            # Find the app directory
            APP=$(find /home/u461388193 -maxdepth 5 -name "package.json" \
              -not -path "*/node_modules/*" \
              -not -path "*/.next/*" \
              2>/dev/null | head -1 | xargs -I{} dirname {})

            echo "▸ App directory: $APP"
            cd "$APP"

            # Pull latest code
            git pull origin master

            # Install dependencies (includes build tools)
            npm install

            # Build Next.js
            npm run build

            # Restart the Node.js app
            # Try PM2 first, fall back to touching server.js (triggers process manager)
            if command -v pm2 &>/dev/null; then
              pm2 restart all
            else
              touch server.js
            fi

            echo "✅ Deploy complete"
